{{- $needAdminPw := not .Values.midpoint.existingSecret -}}
{{- $needDbPw := not (or .Values.postgresql.auth.existingSecret .Values.externalDatabase.existingSecret) -}}
{{- if or $needAdminPw $needDbPw }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "midpoint.fullname" . }}
  labels:
    {{- include "midpoint.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $needAdminPw }}
  admin-password: {{ required "midpoint.adminPassword is required when not using existingSecret" .Values.midpoint.adminPassword | b64enc | quote }}
  {{- end }}
  {{- if $needDbPw }}
  database-password: {{ ternary .Values.postgresql.auth.password .Values.externalDatabase.password .Values.postgresql.enabled | b64enc | quote }}
  {{- end }}
{{- end }}

{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "midpoint.fullname" . }}
  labels:
    {{- include "midpoint.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if .Values.httpRoute.sessionPersistence.enabled }}
      sessionPersistence:
        sessionName: {{ .Values.httpRoute.sessionPersistence.sessionName | quote }}
        type: {{ .Values.httpRoute.sessionPersistence.type }}
        {{- with .Values.httpRoute.sessionPersistence.absoluteTimeout }}
        absoluteTimeout: {{ . }}
        {{- end }}
        {{- with .Values.httpRoute.sessionPersistence.idleTimeout }}
        idleTimeout: {{ . }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ include "midpoint.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
